[scenario]
    id=06_epilog
    name= _ "Epilog"
    next_scenario=null
    turns=-1

    map_file=~add-ons/kronika/maps/zagreb.map

    {DEFAULT_MUSIC_PLAYLIST}

    [time]
        id=dawn
        name= _ "Zora"
        lawful_bonus=13
        red=50
        green=30
        blue=0
        image=misc/time-schedules/schedule-2.png
    [/time]

    [story]
        [part]
            story = _"Sjećate se, ova priča je počela s padom Dubrovnika, Markulesa se pojavio i srušio pola zidina u gradu ostavljajući samo plamen iza sebe."
            background = "story/beginning-of-the-end.png"
        [/part]

        [part]
            story = _"Sa svojim zadnjim dahom Markulesa je nestao, nikada se nije saznalo kako su ta bića došla na ovaj svijet."
            background = "story/the-end.png"
        [/part]

        [part]
            story = _"Markulesa je duh koji pazi na izvore, stabla i sav živi svijet. Je li bio odaziv prirode ili crna magija koja ga je dovela, može li se ponoviti?"
            background = "story/end-xxx.png"
        [/part]

        [part]
            story = _"Je li ova regija zbilja sigurna? Zasad to je dovoljno. Naši heroji su umorni i njihova najveća želja se vratiti tamo otkud su počeli."
            background = "story/zagreb-view.png"
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=Kraljevic
        id=Marko
        name= _ "Kraljević Marko"
        x=26
        y=4
        gold=0
        canrecruit=no
    [/side]

    [event]
        name=start

        [message]
            speaker=narrator
            message= _ "Slavenska regija diše. Po prvi put u dugo vremena — samo diše."
        [/message]

        [message]
            speaker=Marko
            message= _ "Marin. Vlaho. Je li sve gotovo?"
        [/message]

        [message]
            speaker=narrator
            image="portraits/jagar-luk.png"
            message= _ "Baji su se raspali. Regije i njezini gradovi ostaju kakvi jesu."
        [/message]

        [message]
            speaker=narrator
            image="portraits/antune.png"
            message= _ "Zapisat ću sve ovo. Svako ime, svako mjesto. Da se ne zaboravi. I onda ću zapaliti jednu."
        [/message]

        [message]
            speaker=Marko
            message= _ "Hoće li biti dovoljno?"
        [/message]

        [message]
            speaker=narrator
            image="portraits/antune.png"
            message= _ "Nikada nije buraz, šta je tu je znaš."
        [/message]

        [message]
            speaker=narrator
            message= _ "Marko gleda prema jugu. Zora se diže nad Hrvatskom. Negdje daleko, more još uvijek udara o obalu Dubrovnika. Negdje daleko, Dalmacija miruje pod prvim toplim jutrom. A ovdje — samo tihi koraci četiri čovjeka koji su prošli previše da bi slavili, i premalo da bi zaboravili."
        [/message]

        [message]
            speaker=narrator
            message= _ "Kad tama ponovno dođe... Marko će se vratiti."
        [/message]

        [message]
            speaker=narrator
            image="portraits/antune.png"
            message= _ "Vamos!"
        [/message]

        [endlevel]
            result=victory
            bonus=no
        [/endlevel]

    [/event]

[/scenario]