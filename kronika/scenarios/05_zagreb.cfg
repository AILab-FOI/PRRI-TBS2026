[scenario]
    id = 05_zagreb
    name = _"Završetak s Zagrebom"
    next_scenario = 06_epilog
    turns = 30

    map_file=~add-ons/kronika/maps/zagreb.map

    [time]
    id=dusk
    name= _ "Sumrak"
    lawful_bonus=-13
    red=20
    green=0
    blue=40
    image=misc/time-schedules/schedule-3.png
    [/time]

    [time]
    id=night
    name= _ "Noć"
    lawful_bonus=-25
    red=0
    green=0
    blue=50
    image=misc/time-schedules/schedule-4.png
    [/time]

    [time]
    id=second_watch
    name= _ "Kasna noć"
    lawful_bonus=-25
    red=0
    green=0
    blue=40
    image=misc/time-schedules/schedule-5.png
    [/time]

    {DEFAULT_MUSIC_PLAYLIST}

    [story]
        [part]
            story = _"Nakon otkrića u Slavoniji, Kraljević Marko i njegovi Jagari kreću prema podnožju planina Središnje Hrvatske, u grad koji svaki hrvat dobro zna. ZAGREB. Pred njima se otvara začarana šuma u kojoj se putovi pomiču, drveće šapuće, a magla skriva izvor svega zla."
            background = "story/croatia-map.png"
            music="sredisnja_hrvatska.ogg"
        [/part]

        [part]
            story = _"Zadnja destinacija je Zagreb, Markulesa te očekuje. Kreni prema njemu Marko i zaustavi ovo zlo"
            background = "story/zagreb-view.png"
        [/part]
    [/story]

    [side]
        side = 1
        fog=yes
        controller = human
        team_name = player
        user_team_name = _"Marko"
        type = Kraljevic
        id = Marko
        name = _"Kraljević Marko"
        canrecruit = yes
        recruit = Jagar, Jagar_Luk, Jagar_Noz
        gold = 200
        income = 2
        x = 7
        y = 28
    [/side]

    [side]
        side = 2
        controller = ai
        team_name = enemy
        user_team_name = _"Markulesa"
        type = Markulesa
        id = Markulesa
        name = _"Markulesa I."
        canrecruit = yes
        recruit = Baji, Baji_Ranged, Baji_Dual
        gold = 150
        income = 6
        x = 14
        y = 7
        [ai]
            aggression=0.3
            caution=0.6
            recruitment_pattern=Baji,Baji,Baji_Dual
            [goal]
                name=protect_unit
                [criteria]
                    id=Markulesa
                [/criteria]
                value=5
            [/goal]
            [goal]
                name=target
                [criteria]
                    side=1
                [/criteria]
                value=2
            [/goal]
        [/ai]
    [/side]

    [objectives]
        side = 1
        [objective]
            description = _"Završi ovu bitku za Hrvatsku!"
            condition = win
        [/objective]
        [objective]
            description = _"Uništi sva 3 totema moći"
            condition = win
        [/objective]
        [objective]
            description = _"Smrt Kraljevića Marka"
            condition = lose
        [/objective]
        [objective]
            description = _"Isteknu potezi"
            condition = lose
        [/objective]
    [/objectives]

    [event]
        name = prestart

        {VARIABLE totems_destroyed 0}
        {VARIABLE forest_shift_done no}
        {VARIABLE markulesa_midfight no}

        [unit]
            side = 1
            type = Jagar_Luk
            id = Jagar1
            name = _"Marin"
            x = 8
            y = 28
        [/unit]

        [unit]
            side = 1
            type = Jagar
            id = Jagar2
            name = _"Vlaho"
            x =9
            y = 28
        [/unit]

        [unit]
            side = 1
            type = Antun
            id = Antun
            name = _"Antun"
            x =10
            y = 28
        [/unit]

        [item]
            x = 12
            y = 6
            image = "items/ball-blue.png"
        [/item]

        [item]
            x = 31
            y = 16
            image = "items/ball-blue.png"
        [/item]

        [item]
            x = 35
            y = 4
            image = "items/ball-blue.png"
        [/item]

        [label]
            x = 12
            y = 6
            text = _"Totem moći"
        [/label]

        [label]
            x = 31
            y = 16
            text = _"Totem moći"
        [/label]

        [label]
            x = 35
            y = 4
            text = _"Totem moći"
        [/label]
    [/event]

    [event]
    name=start

    [message]
        speaker=narrator
        message= _ "Zagreb. Marko nije spavao tri noći. Jagari to znaju. Ne govore ništa."
    [/message]

    [message]
        speaker=Marko
        message= _ "Svaki od njih je pao i rekao mi da postoji sljedeći. Krampus. Crni Covjek. Baba Jaga. Što ako Markulesa padne i kaže isto? Što ako ovaj put nema kraja?"
    [/message]

    [message]
        id=Jagar1
        message= _ "Marko. Antun je preveo poruku."
    [/message]

    [message]
        id=Antun
        image="portraits/antune.png"
        message= _ "Crni Covjek te proklinje na zlo i traži svog gospodara za tvoju smrt, baš nije kul kompa. Zanimljivo je da opisuje Markulesu kao kraljevića i jedinog vladara ove regije."
    [/message]

    [message]
        speaker=Marko
        message= _ "I šta s tim? Nikad nije kraj, nikad nije dovoljno. Iz dana u dan samo ubijamo i ubijamo i ubijamo i ubijamo i ubijamo. NE MOGU VIŠE!!!!! ZAŠTO JAAAAAA!!!"
    [/message]

    [message]
        speaker=narrator
        message= _ "Odgovor koji je dobio: jer ti ne staješ. Svaki neprijatelj kojeg si sreo znao je tvoje ime prije nego što si stigao. Imaš talent da okupiš ljude i da ih spasiš od njih samih."
    [/message]

    [message]
        speaker=Marko
        message= _ "..."
    [/message]

    [message]
        speaker=Marko
        message= _ "Onda idemo."
    [/message]

    [message]
        speaker=Antun
        message= _ "Oh zaboravio sam reći, trebalo bi maknuti ova tri totema prije sukoba s Markulesom, u legendama Markulesa je opisan kao zaštitnik šuma i prirode. Moguće je da je njegov plan sve pretvoriti u šume. Sretno momci. Nisam već dugo zapalio."
    [/message]

    [message]
        speaker=Markulesa
        message= _ "Ako ijedan od tri totema ostane, ova civilizacija će izgubiti sve gradove i ovoj zemlji ću vratiti šume."
    [/message]

    [message]
        speaker=Markulesa
        message= _ "Čekam te na samom kraju."
    [/message]

    [message]
        speaker=Markulesa
        message= _ "Marko."
    [/message]

[/event]

    [event]
        name = moveto
        first_time_only = yes

        [filter]
            side = 1
            x = 14-17
            y = 17-20
        [/filter]

        [message]
            speaker = Jagar2
            message = _"Put... nestao je!"
        [/message]

        [message]
            speaker = Marko
            message = _"On nas vodi kamo želi."
        [/message]

        {VARIABLE forest_shift_done yes}

        [terrain]
            x = 15,16,17
            y = 18,18,18
            terrain = Gs^Fms
        [/terrain]

        [terrain]
            x = 13,14
            y = 19,19
            terrain = Rr
        [/terrain]

        [redraw][/redraw]
    [/event]

    [event]
        name = moveto
        first_time_only = yes

        [filter]
            side = 1
            x = 12
            y = 6
        [/filter]

        [remove_item]
            x = 12
            y = 6
        [/remove_item]

        {VARIABLE_OP totems_destroyed add 1}

        [message]
            speaker = Marko
            message = _"Jedan totem je uništen"
        [/message]

        [unit]
            side = 2
            type = Baji
            id = BajiTotem1
            name = _"Baji"
            x = 13
            y = 20
        [/unit]

        [message]
            speaker = BajiTotem1
            message = _"!!!"
        [/message]
    [/event]

    [event]
        name = moveto
        first_time_only = yes

        [filter]
            side = 1
            x = 31
            y = 16
        [/filter]

        [remove_item]
            x = 31
            y = 16
        [/remove_item]


        {VARIABLE_OP totems_destroyed add 1}

        [message]
            speaker = Marko
            message = _"Drugi totem je pao!"
        [/message]

        [unit]
            side = 2
            type = Baji_Dual
            id = BajiTotem2
            name = _"Baji"
            x = 19
            y = 14
        [/unit]

        [unit]
            side = 2
            type = Baji_Ranged
            id = BajiTotem3
            name = _"Baji"
            x = 18
            y = 13
        [/unit]
    [/event]

    [event]
        name = moveto
        first_time_only = yes

        [filter]
            side = 1
            x = 35
            y = 4
        [/filter]

        [remove_item]
            x = 35
            y = 4
        [/remove_item]

        {VARIABLE_OP totems_destroyed add 1}

        [message]
            speaker = Markulesa
            message = _"Ti zbilja moraš uništiti sve što stvorim, zar ne Markoooooo."
        [/message]

        [message]
            speaker = Marko
            message = _"Ovo završava sada."
        [/message]

        [unit]
            side = 2
            type = Baji
            id = BajiTotem4
            name = _"Baji"
            x = 24
            y = 9
        [/unit]
    [/event]

    [event]
        name = moveto
        first_time_only = yes

        [filter]
            side = 1
            x = 24-28
            y = 3-6
        [/filter]

        [message]
            speaker = Markulesa
            message = _"Napokon si stigao, Marko."
        [/message]

        [message]
            speaker = Marko
            message = _"Ti stojiš iza svega ovoga!"
        [/message]

        [message]
            speaker = Markulesa
            message = _"Ja samo vraćam ravnotežu koju su ljudi davno narušili."
        [/message]
    [/event]

    [event]
        name = attack
        first_time_only = yes

        [filter]
            id = Marko
        [/filter]

        [filter_second]
            id = Markulesa
        [/filter_second]

        [message]
            speaker = Markulesa
            message = _"Ja samo vraćam ono što je moje Marko, zaustavi me ako se usudiš, ali ja poznajem tebe bolje nego ti sam sebe. Priznaj, vidiš mene u sebi. Nisi ništa nego tiranin i sebična osoba koja je uzela sve regije za svoju slavu."
        [/message]

        [message]
            speaker = Marko
            message = _"Ne možeš uzeti ovu zemlju za sebe."
        [/message]

        [message]
            speaker = Markulesa
            message = _"Mogu i hoću, samo stoji tamo i gledaj."
        [/message]
    [/event]

    [event]
        name = last breath
        [filter]
            id = Marko
        [/filter]

        [message]
            speaker = Marko
            message = _"MARKULESAAAA, urgh, krghh, ah ah, ne ću ti dati da uspiješ. "
        [/message]

        [message]
            speaker = Markulesa
            message = _"Imaš dobar izraz na svom licu Marko, hahahaha, nadam se da te nikada više ne vidim."
        [/message]

        [endlevel]
            result = defeat
        [/endlevel]
    [/event]

    [event]
        name = die
        [filter]
            id = Markulesa
        [/filter]

        [filter_condition]
            [variable]
                name = totems_destroyed
                numerical_equals = 3
            [/variable]
        [/filter_condition]

        [message]
            speaker = Markulesa
            message = _"Marko, Marko zbilja mi kvariš dan znaš to."
        [/message]

            [message]
        id=Markulesa
        image="portraits/markulesa.png"
        message= _ "Hahahaha... ha. Ha."
        [/message]

        [message]
            speaker=Marko
            message= _ "Što je smješno?"
        [/message]

        [message]
            id=Markulesa
            image="portraits/markulesa.png"
            message= _ "Ti. Zbilja misliš da si nešto završio. Ja nisam bio cilj. Ja sam bio brava. Ti si bravi slomio prste i ušao u kuću."
        [/message]

        [message]
            id=Markulesa
            image="portraits/markulesa.png"
            message= _ "Živjet ćeš, Marko. To je tvoja kazna. I jedne noći — možda za godinu, možda za deset — čut ćeš kopita. I bit ćeš umoran. I nećeš imati Jagare uz sebe. I tada ćeš razumjeti zašto sam se smijao."
        [/message]

        [message]
            speaker=Marko
            message= _ "Za sada — gotovo."
        [/message]

        [message]
            speaker=narrator
            message= _ "Šuma je tiha. Stvarno tiha, ovaj put. Jagari se skupljaju u tišini. Nema slavlja. Samo dah."
        [/message]

        [endlevel]
            result=victory
            bonus=yes
            next_scenario=06_epilog
        [/endlevel]

    [/event]

    [event]
        name = die
        [filter]
            id = Markulesa
        [/filter]

        [filter_condition]
            [variable]
                name = totems_destroyed
                numerical_not_equals = 3
            [/variable]
        [/filter_condition]

        [message]
            speaker = Markulesa
            message = _"Sljedeći put, baci pogled oko sebe Marko."
        [/message]

        [endlevel]
            result = defeat
        [/endlevel]
    [/event]

    [event]
        name = time over

        [message]
            speaker = Markulesa
            message = _"Moj plan je uspio Marko, vratiti ću ovu nesposobnu regiju na tvorničke postave, ostati će samo šuma i zemlja."
        [/message]

        [message]
            speaker = Markulesa
            message = _"Do viđenja Marko."
        [/message]

        [endlevel]
            result = defeat
        [/endlevel]
    [/event]
[/scenario]
