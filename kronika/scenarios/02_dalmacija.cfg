[scenario]
    id=02_dalmacija
    name= _ "Dalmacija — Dolazak zime"
    next_scenario=03_istra
    turns=32
    victory_when_enemies_defeated=yes

    map_file=~add-ons/kronika/maps/dalmacija.map

    {DEFAULT_SCHEDULE}
    {DEFAULT_MUSIC_PLAYLIST}

    [story]

        [part]
            story = _"Dok Marko putuje dalje, u drugim krajevima vlada nemir. Šume Istre uzimaju mnoge, ljudi masovno oboljevaju u Slavoniji i u glavnom gradu Zagrebu traje buna, Markova sljedeća destinacija je oko područja Like. "
            background ="story/croatia-map.png"
            music="dalmacija.ogg"
        [/part]

        [part]
            story = _"Sjeverno od Dubrovnika more i kopno se počelo hladiti, u 3 dana sve je zahvatio mraz."
            background ="story/croatia-map.png"
        [/part]

        [part]
            story = _"Puteva je mnogo i neki su bez povratka. Može li Marko preći prepeke leda i naći izvor ovog zla. "
            background ="story/dalmatia-view.png"
        [/part]

        [part]
            story = _"Kraljević Marko i njegovi Jagari su naišli na stari dvorac gdje rade kamp. Marko se mora odlučiti kojim putevima njegovi vojnici idu dalje."
            background ="story/dalmatia-view.png"
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        team_name=player
        user_teamname= _ "Kraljević Marko"
        canrecruit=yes
        type=Kraljevic
        id=Marko
        name= _ "Kraljević Marko"
        x=28
        y=31
        recruit=Jagar, Jagar_Luk, Jagar_Noz
        gold=130
        income=2
    [/side]

    [side]
        side=2
        controller=ai
        team_name=enemy
        user_teamname= _ "Krampus"
        canrecruit=yes
        type=Krampus
        id=Krampus
        name= _ "Krampus"
        x=26
        y=2
        recruit=Dzin_Svjetlo,Dzin_Svjetlo,Dzin
        gold=60
        income=1
        [ai]
            aggression=0.7
            caution=0.3
            [goal]
            name=target
                [criteria]
                side=1
                [/criteria]
            value=3
            [/goal]
            [goal]
            name=target
                [criteria]
                id=Marko
                [/criteria]
            value=5
            [/goal]
        [/ai]
    [/side]

    [objectives]
            side=1
            [objective]
                description= _ "Probij se kroz Krampusovu vojsku divova i džina"
                condition=win
            [/objective]
            [objective]
                description= _ "Uništi Krampusov izvor moći"
                condition=win
            [/objective]
            [objective]
                description= _ "Porazi Krampusa"
                condition=win
            [/objective]
            [objective]
                description= _ "Smrt Kraljevića Marka"
                condition=lose
            [/objective]
            [objective]
                description= _ "Nestane poteza"
                condition=lose
            [/objective]
            [note]
                description= _ "Snježna oluja će se pojačavati tijekom pohoda. Drži Jagare zajedno i ne gubi vrijeme u zaleđenim klancima."
            [/note]
        [/objectives]

    [event]
        name=prestart
        [unit]
            side = 1
            type = Jagar_Luk
            id = Jagar1
            name = _"Marin"
            x = 30
            y = 27
        [/unit]

        [unit]
            side = 1
            type = Jagar
            id = Jagar2
            name = _"Vlaho"
            x = 29
            y = 28
        [/unit]

        [item]
            x=28
            y=6
            image=scenery/monolith1.png
        [/item]

        [label]
            x = 28
            y = 6
            text = _"Oltar leda"
        [/label]
    [/event]

    [event]
        name=start

        [message]
            speaker=narrator
            message= _ "Dalmacija. Obala koja je nekada mirisala na sol i borove sada škripi pod ledom. More udara o obalu kao da želi pobjeći od zime."
        [/message]

        [message]
            speaker=Marko
            message= _ "Ovo nije prirodna zima. Sunce stoji nad nama, a dah nam se ledi pred licem."
        [/message]

        [message]
            id=Jagar2
            message= _ "Sela su prazna, Marko. Vrata su otvorena, ognjišta ugašena. Ljudi su otišli naglo — ili su ih odveli."
        [/message]

        [message]
            speaker=Marko
            message= _ "Vještica iz Dubrovnika govorila je o onome koji vlada zimom. Sada znam njegovo ime. Krampus."
        [/message]

        [message]
            id=Jagar1
            message= _ "Planinski prolazi su zatvoreni. U klancima se miču sjene, a iza njih čujem korake koji nisu ljudski."
        [/message]

        [message]
            speaker=Marko
            message= _ "Krampus je zarobio prolaze i okupio vojsku džina. Ako želimo dalje, moramo do njegova oltara i slomiti izvor ove zime."
        [/message]

        [message]
            speaker=narrator
            message= _ "Visoko među zaleđenim stijenama gori crni oltar. Dok on stoji, oluja sluša Krampusovu volju."
        [/message]
    [/event]

    [event]
        name=turn 5

        [message]
            speaker=narrator
            message= _ "Snježna oluja spušta se niz planinu. Vidik se gubi, a svaka stopa naprijed traži snagu."
        [/message]

        [message]
            speaker=Marko
            message= _ "Jagari, držite redove! Krampus želi da se razdvojimo. Ne dajte mu taj dar."
        [/message]
    [/event]

    [event]
        name=turn 12

        [message]
            speaker=narrator
            message= _ "Oluja se pretvara u bijeli zid. Iz njega odjekuje rožnati smijeh i zveckanje lanaca."
        [/message]

        [message]
            speaker=Krampus
            message= _ "Hssssss, Dosssli ste daleko, Kraljevicu Marko. Joss malo pa će vam kosti čuvati moje prolaze. Vass put završava ovdje."
        [/message]

        [message]
            speaker=Marko
            message= _ "Tvoja zima završava ovdje. Dalmacija će opet čuti more, a ne tvoje lance."
        [/message]
    [/event]

    [event]
        name=moveto
        first_time_only=yes

        [filter]
        side=1
            [filter_location]
            x=25,25,26,26
            y=6,7,6,5
            [/filter_location]
        [/filter]

        [message]
        speaker=narrator
        image="portraits/fenjeras.png"
        message= _ "...zanimljivo, moram javiti gospodaru da postoji trn u njegovom oku, krampus nemoj me razočarati"
    [/message]

    [/event]

    [event]
        name=moveto
        [filter]
            side=1
            x=28
            y=6
        [/filter]

        [message]
            speaker=narrator
            message= _ "Markovi Jagari razbijaju crni oltar. Led puca pod nogama, a oluja na trenutak gubi glas."
        [/message]

        [message]
            speaker=Krampus
            message= _ "Ne! TAJ PLAMEN NIJE VASS! Bez njega... bez njega planine me neće slusati!"
        [/message]

        [message]
            speaker=Marko
            message= _ "Onda ćeš se boriti bez ukradene moći."
        [/message]
    [/event]

    [event]
        name=die
        [filter]
            id=Marko
        [/filter]
        [message]
            speaker=Marko
            message= _ "Nisam... nisam uspio..."
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]

    [event]
        name=time over
        [message]
            speaker=narrator
            message= _ "Oluja je zatvorila prolaze. Krampusova zima ostala je nad Dalmacijom, a Markov put dalje nestao je pod snijegom."
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]

    [event]
        name=die
        [filter]
            id=Krampus
        [/filter]
        [message]
            speaker=Krampus
            message= _ "Misliš da si pobijedio zimu, Kraljeviću? Ja sam bio samo lanac na vratima... a vrata vode u ssume gdje ni sunce ne ulazi."
        [/message]
        [message]
            speaker=Marko
            message= _ "Govori jasno, nakazo. Tko stoji iza ovoga?"
        [/message]
        [message]
            speaker=Krampus
            message= _ "cogh, cogh, preko kopna kraljevicu vise ne možesss, iako je moja zima prestala led će barem da sstoji još neko vrijeme."
        [/message]
        [message]
            speaker=Krampus
            message= _ "Preko mora ljudi nestaju, NESTANI S NJIMA I NAĆI ĆU TE OPET 6 METARA ISPOD KRALJEVIĆUuuuuu."
        [/message]
        [message]
            speaker=narrator
            message= _ "Krampus se raspada u ledeni prah. S njegovom smrću more prvi put ponovno prodiše, a led će da ostane još neko vrijeme u dalmaciji. Ipak, mir ne traje dugo."
        [/message]
        [message]
            speaker=narrator
            message= _ "Iz razbijenog oltara ostaje crna iskra. Ne gasi se u snijegu, nego poleti prema zapadu, preko planina i kamenjara, sve do gustih istarskih šuma."
        [/message]
        [message]
            speaker=Marko
            message= _ "Dalmacija je oslobođena, ali put nije završen. Ako ta iskra vodi prema Istri, ondje ćemo naći sljedeće zlo. Jagari, skupite ranjene. Krećemo prije nego što tama stigne prva."
        [/message]
        [message]
            id=Jagar1
            type=Spearman
            message= _ "Marko u pravu je, jedina opcija koja nam preostaje je da idemo u Istru s južne strane zbog ovog leda."
        [/message]
        [message]
            speaker=narrator
            message= _ "Dok Marko i Jagari napuštaju obalu, iza njih se vraća šum mora. Pred njima se, na zapadu, diže šuma koja ne šumi. Tamo počinje priča o Čovjeku iz sjene."
        [/message]
        [endlevel]
            result=victory
            bonus=yes
            carryover_percentage=40
        [/endlevel]
    [/event]

[/scenario]
