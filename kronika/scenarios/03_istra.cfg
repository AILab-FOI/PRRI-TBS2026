[scenario]
    id=03_istra
    name= _ "Istra, gdje se tama hrani"
    next_scenario=04_slavonija
    turns=40
    victory_when_enemies_defeated=yes

    map_file=~add-ons/kronika/maps/istra.map

    {DEFAULT_SCHEDULE}
    {DEFAULT_MUSIC_PLAYLIST}

    [story]
        [part]
            background="story/battle-at-crampus.png"
            story= _ "Marku su ostale u sjećanju krampusove zadnje riječi koje su mu počele stvarati pritisak. Jagari javljaju da već par noći Marko slabo spava."
        music="istra.ogg"
        [/part]

        [part]
            background="story/battle-at-crampus.png"
            story= _ "Noć ne čeka nikoga Marko, idi dalje."
        [/part]

        [part]
            story = _"S pojavom mitloških čudovišta, nažalost ni Istra nije izbjegla nevolje. Kratko vrijeme nakon pada Dubrovnika Istarska središnja sela su također uhvaćena u plamenu. Ljudi koji su izgubili svoje domove prelaze istarske šume. Polovica ljudi uhvaćeni nesrećom ide na jug, a pola na istok."
            background ="story/croatia-map.png"
        [/part]

        [part]
            story = _"Ste čuli za glasinu? Glasina je da ljudi nestaju u istočnim šumama. Majke gube svoje sinove i sinovi gube svoje majke. Priviđaju se mrtve osobe i ljude se obmanjuje. U maglovitim istarskim šumama samo je jedna istina. "
            background ="story/istra-view.png"
        [/part]

        [part]
            story = _"Tko vidi par očiju u tami, neće vidjeti svijetlo svog života. "
            background ="story/istra-view.png"
        [/part]

    [/story]

    [side]
        side=1
        controller=human
        team_name=player
        user_teamname= _ "Kraljevic Marko"
        canrecruit=yes
        type=Kraljevic
        id=Marko
        name= _ "Kraljevic Marko"
        x=23
        y=30
        recruit=Jagar, Jagar_Luk, Jagar_Noz
        gold=170
        income=3
        fog=yes
        shroud=yes
    [/side]

    [side]
        side=2
        controller=ai
        team_name=enemy
        user_teamname= _ "Crni Covjek"
        canrecruit=yes
        type=Crni_Covjek
        id=CrniCovjek
        name= _ "Crni Covjek"
        x=2
        y=4
        recruit=Fenjer_Nosac, Fenjeras_Human
        gold=100
        income=2
        [ai]
            aggression=0.4
            caution=0.8
        [/ai]
    [/side]

    [event]
        name=prestart

        [objectives]
            side=1
            [objective]
                description= _ "Porazi Crnog Čovjeka"
                condition=win
            [/objective]
            [objective]
                description= _ "Smrt Kraljevića Marka"
                condition=lose
            [/objective]
            [objective]
                description= _ "Nestane poteza"
                condition=lose
            [/objective]
        [/objectives]

        [item]
            x=28
            y=6
            image=scenery/torch1.png
        [/item]

        [unit]
            side = 1
            type = Jagar_Luk
            id = Jagar1
            name = _"Marin"
            x = 24
            y = 30
        [/unit]

        [unit]
            side = 1
            type = Jagar
            id = Jagar2
            name = _"Vlaho"
            x = 25
            y = 30
        [/unit]

        [unit]
            side = 1
            type = Jagar_Noz
            id = Jagar3
            name = _"Jagar"
            x = 23
            y = 31
        [/unit]

    [/event]

    [event]
        name=start

        [message]
            speaker=narrator
            message= _ "Istra. Brda ovdje su maglovita. Pustoš i kamen. Stara opustošena sela i rudnici. Jedina povezanost s hrvatskom je stari tunel na istoku ."
        [/message]

        [message]
            speaker=Marko
            message= _ "Ovo nije dobro. Sela koja smo prošli su prazna. Nema ni traga života. Nema divljači. Ničeg. Kad smo došli bilo mi je drago vidjeti da su ljudi na jugu Istre na sigurnom. Spomenuli su da je kristal išao prema istoku"
        [/message]

        [message]
            speaker=narrator
            image="portraits/jagar-luk.png"
            message= _ "Otkad smo krenuli na istok, osjeti se da je zemlja hladnija, ovo nije dobro Marko zato što  čuo sam od svojih doma, ISTRA NIKAD NIJE HLADNA."
        [/message]

        [message]
            speaker=Marko
            message= _ "Znam Marine, selo prije ljudi su pričali da su nestajanja bila blizu tunela Učke. Muškarci u tunel odlaze i nikad se ne vrate. Pripremite bazu blizu tunela."
        [/message]

        [message]
            speaker=narrator
            image="portraits/jagar-koplje.png"
            message= _ "Na zapovijed!"
        [/message]

        [message]
            speaker=Marko
            message= _ "Moramo naći ulaz unutra, osjećam."
        [/message]


        [message]
            speaker=Marko
            message= _ "Osjećam da je nešto unutra, nešto što nas ne želi tamo."
        [/message]

        [message]
            speaker=narrator
            image="portraits/jagar-dual.png"
            message= _ "Zašto imam osjećaj da ćemo nastradati."
        [/message]

    [/event]

    [event]
        name=die
        [filter]
            id=Marko
        [/filter]
        [message]
            speaker=Marko
            message= _ "Nisam... nisam uspio..."
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]

    [event]
        name=time over
        [message]
            speaker=narrator
            message= _ "Tama je progutala sve. Marko nije uspio na vrijeme."
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]

    [event]
        name=die
        [filter]
            id=CrniCovjek
        [/filter]
        [message]
            speaker=CrniCovjek
            message= _ "-.- .- -.- --- / -- --- --. ..- / --- .--. . - / .. --.. --. ..- -... .. - .. / --- -.. / -.- .-. .- .-.. .--- . ...- .. -.-.. .- -.-.--"
        [/message]
        [message]
            speaker=CrniCovjek
            message= _ "-.- .- --- / -. .- .--- ...- . -.-.. . / --.. .-.. --- --..-- / .--. .-. --- -.- .-.. .. -. .--- . -- / - . / -. .- / ... -- .-. - / --- -.. / -- .- .-. -.- ..- .-.. . ... . --..-- / .--- . -.. .. -. --- --. / ...- .-.. .- -.. .- .-. .- / --- ...- . / -.. .-. --.. .- ...- ."
        [/message]
        [message]
            speaker=Marko
            message= _ "???"
        [/message]
        [message]
            speaker=narrator
            message= _ "Sjena se raspada u tamu. Nitko ne odgovara. Iza njega ostaje samo papir s glagoljicom."
        [/message]
        [message]
            speaker=Jagar
            message= _ "Marko, ovo mi se čini kao pismo glagoljice, čuo sam za jednog povjesničara u Slavoniji. Možda bi je on mogao dešifrirati."
        [/message]
        [endlevel]
            result=victory
            bonus=yes
            carryover_percentage=40
        [/endlevel]
    [/event]

[/scenario]
