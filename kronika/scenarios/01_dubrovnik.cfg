[scenario]
    id= 01_dubrovnik
    name= _"Sjene nad Dubrovnikom"
    next_scenario=02_dalmacija
    turns= 25
    victory_when_enemies_defeated= yes

    map_file=~add-ons/kronika/maps/dubrovnik.map

    {DEFAULT_SCHEDULE}
    {DEFAULT_MUSIC_PLAYLIST}

    [story]
        [part]
            story = _"Naša priča za budućnost Hrvatske započinje s Dubrovnikom u godini 1492."
            background ="story/croatia-map.png"
            music="dubrovnik.ogg"
        [/part]

        [part]
            story = _"Dubrovnik je bio prvi grad oslobođen zle magije kada se kraljević Marko pojavio 2 mjeseca nakon pojave čudovišta. Dubrovnik je u zatočeništvu od tragičnog dana kad su se mitološka bića, ona iz legendi. Pojavila. "
            background ="story/dubrovnik-view.png"
        [/part]

        [part]
            story = _"Marko je seljak koji je sa svog sela Donji Brgat vidio Dubrovnik u plamenu. Isprva se bojao, ali nakon dva mjeseca uzeo je vile u svoje ruke i okupio ono malo vojske što je ostalo i nazvao ih Jagari. Jagari su putovali 7 dana i noći da stignu pred zidine Dubrovnika. Pročulo se da se grad stišao i da jedinu u njemu ostaju svećenici bez glave i vještica."
            background ="story/dubrovnik-view.png"
        [/part]

        [part]
            story = _"Kraljević Marko i njegovi Jagari dolaze pred zidine Dubrovnika. Glasine govore o mračnoj magiji, strahu u ulicama i svećeniku i vještici koja vladaju iz sjena."
            background ="story/dubrovnik-view.png"
        [/part]
    [/story]

    [side]
        side = 1
        controller = human
        team_name = player
        user_team_name = _"Marko"
        type = Kraljevic
        id = Marko
        name = _"Kraljević Marko"
        canrecruit = yes
        recruit = Jagar, Jagar_Luk, Jagar_Noz
        gold = 130
        income = 2
        x = 6
        y = 4
    [/side]

    [side]
        side = 2
        controller = ai
        team_name = enemy
        user_team_name = _"Vjestica"
        type = Vjestica
        id = Vjestica
        name = _"Vjestica"
        canrecruit = yes
        recruit = Walking Corpse,Ghost,Skeleton,Fratar_Bez_Glave
        gold = 110
        income = 4
        x = 34
        y = 12
    [/side]


    [objectives]
        side = 1
        [objective]
            description = _"Porazi Vješticu"
            condition = win
        [/objective]
        [objective]
            description = _"Sekundarni: Očisti gradski trg od neprijatelja"
            condition = win
        [/objective]
        [objective]
            description = _"Smrt Kraljevića Marka"
            condition = lose
        [/objective]
        [objective]
            description = _"Isteknu potezi"
            condition = lose
        [/objective]
    [/objectives]

    [event]
        name = prestart

        [unit]
            side = 1
            type = Jagar_Luk
            id = Jagar1
            name = _"Marin"
            x = 7
            y = 4
        [/unit]

        [unit]
            side = 1
            type = Jagar
            id = Jagar2
            name = _"Vlaho"
            x = 8
            y = 4
        [/unit]

        [unit]
            side = 3
            type = Fratar_Bez_Glave
            id = Fratar1
            name = _"Fratar bez glave"
            x = 12
            y = 11
        [/unit]

    [/event]

    [event]
        name = start
        [message]
            speaker = Marko
            message = _"Dakle, ovo je Dubrovnik... tih, obavijen strahom. Nešto zlo zavladalo je ovim gradom."
        [/message]
        [message]
            speaker = Jagar1
            message = _"Gospodaru, ulice su prazne. Ali osjećam da nas netko promatra. Nismo sami."
        [/message]
        [message]
            speaker = Marko
            message = _"Držite se zajedno. Ući ćemo u grad, razbiti njihovu vlast i pronaći Vješticu koja stoji iza ove tame."
        [/message]
        [message]
            speaker = Fratar1
            message = _"Nitko neće narušiti njezin dvor iz sjene..."
        [/message]
    [/event]

    [event]
        name = moveto
        first_time_only = yes
        [filter]
            side = 1
            x = 10-14
            y = 9-13
        [/filter]
        [message]
            speaker = Marko
            message = _"Ovo mora biti gradski trg. Budite spremni! Ova tišina je zamka."
        [/message]
        [unit]
            side = 3
            type = Fratar_Bez_Glave
            id = FratarPojacanje1
            name = _"Fratar bez glave"
            x = 15
            y = 8
        [/unit]
        [message]
            speaker = FratarPojacanje1
            message = _"Trg pripada mrtvima!"
        [/message]
    [/event]

    [event]
        name = moveto
        first_time_only = yes
        [filter]
            side = 1
            x = 18-22
            y = 3-7
        [/filter]
        [message]
            speaker = Vjestica
            message = _"Daleko si stigao, Marko... ali ove zidine, ovo kamenje, ove sjene sada slušaju mene."
        [/message]
        [message]
            speaker = Marko
            message = _"Tvoja tama završava večeras, Vještice."
        [/message]
    [/event]

    [event]
        name = last breath
        [filter]
            id = Marko
        [/filter]
        [message]
            speaker = Marko
            message = _"Podbacio sam... Dubrovnik je izgubljen..."
        [/message]
        [endlevel]
            result = defeat
        [/endlevel]
    [/event]

    [event]
        name = die
        [filter]
            id = Vjestica
        [/filter]
        [message]
            speaker = Vjestica
            message = _"Urghh....Marko je li?, Odustani dok možeš, gospodar tame će uzeti cijelu zemlju i tvoju glavu. Sjever je hladniji nego ikada otkad je Krampus došao, ne možeš ga proći. Tamo samo vijori vjetar i zvuk lanaca."
        [/message]
        [message]
            speaker = Marko
            message = _"Vraćam Dubrovnik građanima, a mi jagari idemo na sjever!"
        [/message]
        [message]
            speaker = Jagar1
            message = _"Sjene se povlače, gospodaru. Ali ovo zlo bilo je tek početak."
        [/message]
        [endlevel]
            result = victory
            next_scenario = 02_dalmacija
        [/endlevel]
    [/event]

    [event]
        name = time over
        [message]
            speaker = Vjestica
            message = _"Prekasno, junače. Dubrovnik je još uvijek moj."
        [/message]
        [endlevel]
            result = defeat
        [/endlevel]
    [/event]
[/scenario]
