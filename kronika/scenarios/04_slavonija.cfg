[scenario]
    id=04_slavonija
    name=_"Slavonija – Pakao u nizinama"
    next_scenario = 05_zagreb
    turns=20
    victory_when_enemies_defeated=yes

    map_file=~add-ons/kronika/maps/slavonija.map

    {DEFAULT_SCHEDULE}
    {DEFAULT_MUSIC_PLAYLIST}

    [story]
        [part]
            background="story/Hallucinations-on-Ucka.png"
            story= _ "mmmmarkoooooo, mmMMarkoOOOOO, MARKOOOO!!!"
        [/part]

        [part]
            story=_"Slavonija, pokrajina slabo razvijene poljoprivrede, uvijek. Mislim zbilja što se može reći o Slavoniji. I bez čudovišta njima nije dobro."
            background ="story/croatia-map.png"
        [/part]

        [part]
            story=_"Marko i jagari su otputovali u Slavoniju u potrazi za povjesničarom. Povjesničar Antun je zatvoren čovjek bez žene. Ima veliki interes za biljke roda Cannabis Sativa. Podrijetlom istrijan on je jedna od par osoba koja poznaje glagoljicu."
            background ="story/antun.png"
        [/part]

        [part]
            story=_"Antun je nedavno nestao i smatra se da ga je zarobila vještica."
            background ="story/croatia-map.png"
        [/part]

    [/story]

    [side]
        side=1
        controller=human
        team_name=player
        type=Kraljevic
        id=Marko
        name=_"Marko"
        canrecruit=yes
        recruit=Jagar, Jagar_Luk, Jagar_Noz
        gold=120
        x=5
        y=10
    [/side]

    [side]
        side=2
        controller=ai
        team_name=enemy
        type=Skeleton
        id=Necromancer
        name=_"Dark Spirit"
        canrecruit=yes
        recruit=Skeleton,Skeleton Archer,Ghost
        gold=120
        x=30
        y=10
    [/side]

    [objectives]
        side=1

        [objective]
            description=_"Pobijedi demona"
            condition=win
        [/objective]

        [objective]
            description=_"Smrt Kraljevica Marka"
            condition=lose
        [/objective]
    [/objectives]

    [event]
        name=start

        [message]
            speaker=Marko
            message=_"AARGGHHHH! Još jedna noćna mora."
        [/message]

        [message]
            speaker=Marko
            message=_"Pronađimo vješticu koja drži Antuna što prije i bježimo."
        [/message]

        [message]
            speaker=narrator
            image="portraits/jagar-luk.png"
            message=_"Marko se ne čini dobro u zadnje vrijeme."
        [/message]
    [/event]

    [event]
        name=die

        [filter]
            id=Necromancer
        [/filter]

        [message]
            speaker=Borna
            message=_"The darkness fades... for now."
        [/message]
    [/event]

[/scenario]
