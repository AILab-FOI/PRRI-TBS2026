[scenario]
    id=04_slavonija
    name=_"Slavonija – Pakao u nizinama"
    next_scenario = 05_zagreb
    turns=20

    map_file=~add-ons/kronika/maps/slavonija.map

    {DEFAULT_SCHEDULE}
    {DEFAULT_MUSIC_PLAYLIST}

    [story]
        [part]
            story=_"Slavonija, pokrajina slabo razvijene poljoprivrede, uvijek. Mislim zbilja što se može reći o Slavoniji. I bez čudovišta njima nije dobro."
            background ="story/croatia-map.png"
            music="slavonija.ogg"
        [/part]

        [part]
            story=_"Marko i jagari su otputovali u Slavoniju u potrazi za povjesničarom. Povjesničar Antun je zatvoren čovjek bez žene. Ima veliki interes za biljke roda Cannabis Sativa. Podrijetlom istrijan on je jedna od par osoba koja poznaje glagoljicu."
            background ="story/antun.png"
        [/part]

        [part]
            story=_"Antun je nedavno nestao i smatra se da ga je zarobila vještica."
            background ="story/croatia-map.png"
        [/part]

        [part]
            background="story/Hallucinations-on-Ucka.png"
            story= _ "mmmmarkoooooo, mmMMarkoOOOOO, MARKOOOO!!!"
        [/part]

    [/story]

    [side]
        side=1
        controller=human
        team_name=player
        type=Kraljevic
        id=Marko
        name=_"Marko"
        canrecruit=yes
        recruit=Jagar, Jagar_Luk, Jagar_Noz
        gold=120
        x=5
        y=10
    [/side]

    [side]
        side=2
        controller=ai
        team_name=enemy
        type=Baba_Jaga
        id=BabaJaga
        name=_"Baba Jaga"
        canrecruit=yes
        recruit=Vampir_Unit, Ghost
        gold=120
        x=30
        y=10
        [ai]
            aggression=0.8
            caution=0.2
            [goal]
                name=target
                [criteria]
                    id=Antun
                [/criteria]
                value=10
            [/goal]
            [goal]
                name=target
                [criteria]
                    side=1
                [/criteria]
                value=3
            [/goal]
    [/ai]
    [/side]

    [side]
    side=3
    controller=null
    team_name=prisoner
    no_leader=yes
    hidden=yes
    [/side]

    [objectives]
        side=1

        [objective]
            description=_"Pobijedi Babu Jagu"
            condition=win
        [/objective]

        [objective]
            description=_"Spasi Antuna"
            condition=win
        [/objective]

        [objective]
            description=_"Smrt Kraljevica Marka"
            condition=lose
        [/objective]

        [objective]
            description=_"Smrt Antuna"
            condition=lose
        [/objective]
    [/objectives]

    [event]
        name=prestart

        [unit]
            side=3
            type=Antun
            id=Antun
            name= _ "Antun"
            x=29
            y=20
        [/unit]

        [item]
        x=25
        y=1
        image="items/key.png"
    [/item]

    [/event]


    [event]
        name=start

        [message]
            speaker=Marko
            message=_"AARGGHHHH! Još jedna noćna mora."
        [/message]

        [message]
            speaker=Marko
            message=_"Pronađimo vješticu koja drži Antuna što prije i bježimo."
        [/message]

        [message]
            speaker=narrator
            image="portraits/jagar-luk.png"
            message=_"Marko se ne čini dobro u zadnje vrijeme."
        [/message]

        [message]
            speaker=narrator
            image="portraits/jagar-luk.png"
            message=_"Otkad smo krenuli na put za Slavoniju iz Istre, vidim u Marku strah."
        [/message]

        [message]
            speaker=narrator
            image="portraits/jagar-koplje.png"
            message=_"Bojim se da će ga strah prevladati prije nego što naše putovanje završi, tko zna što nas još čeka."
        [/message]

        [message]
            speaker=narrator
            image="portraits/jagar-luk.png"
            message=_"Nadam se da je Antun živ."
        [/message]

    [/event]

    [event]
    name=moveto
    first_time_only=yes

    [filter]
        side=1
        [filter_location]
            x=25
            y=1
            radius=1
        [/filter_location]
    [/filter]

    [message]
        speaker=Marko
        message= _ "Ključ tamnice. Sad samo treba naći Antuna."
    [/message]


    [remove_item]
        x=25
        y=1
    [/remove_item]

    [terrain]
        x=30
        y=18
        terrain=Gs^Fms
    [/terrain]

    [redraw][/redraw]

    [/event]
    


    [event]
        name=moveto
        first_time_only=yes

        [filter]
            side=1
            [filter_location]
                x=29
                y=20
                radius=1
            [/filter_location]
        [/filter]

        [message]
            speaker=Marko
            message= _ "Antune, možeš li hodati?"
        [/message]

        [message]
            speaker=Antun
            message= _ "Može li Marin popiti gajbu pive, naravno da mogu kompa."
        [/message]

    [modify_unit]
            [filter]
                id=Antun
            [/filter]
            side=1
        [/modify_unit]
    [/event]


    [event]
        name=die

        [filter]
            id=BabaJaga
        [/filter]

        [message]
            speaker=BabaJaga
            message=_"Nećete stići, naš gospodar će da završi ono što je započeo."
        [/message]

         [if]
            [have_unit]
                id=Antun
                side=1
            [/have_unit]
        [then]
            [message]
                speaker=Marko
                message=_"Antun je siguran. Idemo odavde."
            [/message]
                [endlevel]
                result=victory
                bonus=yes
                carryover_percentage=40
                [/endlevel]
        [/then]
            [else]
                [message]
                speaker=Marko
                message=_"Vještica je mrtva ali Antun još nije slobodan. Pronađite ga!"
                [/message]
            [/else]
        [/if]
    [/event]

    [event]
        name=time over
        [message]
            speaker=narrator
            message=_"Baba Jaga je pojela Antuna i pobjegla iz Slavonije"
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]

    [event]
        name=die

        [filter]
            id=Marko
        [/filter]

        [message]
            speaker=Marko
            message=_"Tako blizu..."
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]

    [event]
        name=die

        [filter]
            id=Antun
        [/filter]

        [message]
            speaker=Antun
            message=_"Da barem zapalim još jednu buraz."
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]

[/scenario]
