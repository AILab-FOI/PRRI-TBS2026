[scenario]
    id=04_slavonia
    name=_"Slavonija – Pakao u nizinama"
    next_scenario = 05_zagreb
    turns=20
    victory_when_enemies_defeated=yes

    map_file=~add-ons/kronika/maps/slavonija.map

    {DEFAULT_SCHEDULE}
    {DEFAULT_MUSIC_PLAYLIST}

    [story]
        [part]
            story=_"Deep in the lands of Slavonia, dark forces gather in the marshes..."
            background="data/add-ons/BattleOfVinodol/graphics/campaign-image.png"
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        team_name=player
        type=Kraljevic
        id=Borna
        name=_"Borna"
        canrecruit=yes
        recruit=Spearman,Jagar,Horseman
        gold=120
        x=5
        y=10
    [/side]

    [side]
        side=2
        controller=ai
        team_name=enemy
        type=Skeleton
        id=Necromancer
        name=_"Dark Spirit"
        canrecruit=yes
        recruit=Skeleton,Skeleton Archer,Ghost
        gold=120
        x=30
        y=10
    [/side]

    [objectives]
        side=1

        [objective]
            description=_"Pobijedi demona"
            condition=win
        [/objective]

        [objective]
            description=_"Smrt Borne"
            condition=lose
        [/objective]
    [/objectives]

    [event]
        name=start

        [message]
            speaker=Borna
            message=_"These lands feel cursed... Stay alert!"
        [/message]

        [message]
            speaker=Necromancer
            message=_"You should not have come here, mortal..."
        [/message]
    [/event]

    # ========================
    # WIN EVENT
    # ========================
    [event]
        name=die

        [filter]
            id=Necromancer
        [/filter]

        [message]
            speaker=Borna
            message=_"The darkness fades... for now."
        [/message]
    [/event]

[/scenario]
