    [attack]
        name=zraka_svjetla
        description= _ "Zraka svjetla"
        icon=attacks/faerie-fire.png
        type=fire
        range=ranged
        damage=5
        number=4
        [specials]
            [chance_to_hit]
                id=magical
                name= _ "magicno"
                description= _ "Uvijek pogada s 70% sanse."
                value=70
                cumulative=no
            [/chance_to_hit]
        [/specials]
    [/attack]

    [movement_costs]
        flat=1
        shallow_water=1
        deep_water=2
        forest=1
        hills=1
        mountains=2
        cave=1
        sand=1
        swamp=1
        unwalkable=99
        impassable=99
    [/movement_costs]

    [defense]
        flat=50
        shallow_water=40
        deep_water=20
        forest=60
        hills=50
        mountains=50
        cave=50
        sand=50
        swamp=40
    [/defense]

    [resistance]
        blade=90
        pierce=90
        impact=90
        fire=20
        cold=130
        arcane=100
    [/resistance]

[/unit_type]
