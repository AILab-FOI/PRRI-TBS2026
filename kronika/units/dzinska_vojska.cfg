[unit_type]
    id=Dzin
    name= _ "Dzin"
    description= _ "Gorostasno bice sumraka pozvano Krampusovom magijom. Sporo ali nezaustavljivo."
    image=units/djinn-idle1.png
    profile=units/djinn-idle1.png
    hitpoints=55
    movement_type = smallfoot
    movement=4
    level=2
    alignment=chaotic
    advances_to=null
    experience=100
    cost=20
    usage=fighter

    [attack]
        name=udarac_tame
        description= _ "Udarac tame"
        icon=attacks/fist-large.png
        type=impact
        range=melee
        damage=9
        number=2
        [specials]
            [slow]
                id=slow
                name= _ "pritisak"
                description= _ "Tezi udarac usporava metu."
            [/slow]
        [/specials]
    [/attack]

    [attack]
        name=vatra_pakla
        description= _ "Vatra pakla"
        icon=attacks/fireball.png
        type=fire
        range=ranged
        damage=5
        number=4
    [/attack]

    [movement_costs]
        flat=1
        shallow_water=2
        deep_water=99
        forest=2
        hills=2
        mountains=3
        cave=2
        sand=1
        swamp=2
        unwalkable=99
        impassable=99
    [/movement_costs]

    [defense]
        flat=30
        shallow_water=20
        deep_water=10
        forest=30
        hills=40
        mountains=40
        cave=30
        sand=40
        swamp=20
    [/defense]

    [resistance]
        blade=70
        pierce=80
        impact=60
        fire=20
        cold=120
        arcane=110
    [/resistance]

[/unit_type]


[unit_type]
    id=Dzin_Svjetlo
    name= _ "Dzin Svjetla"
    description= _ "Manji brat Dzina, brz i nepredvidiv. Zasljepljuje protivnike blistavom magijom."
    image=units/djinn-light-idle1.png
    profile=units/djinn-light-idle1.png
    hitpoints=36
    movement_type = fly
    movement=6
    level=1
    alignment=chaotic
    advances_to=null
    experience=60
    cost=15
    usage=mixed fighter

    [attack]
        name=zasljepljujuci_udarac
        description= _ "Zasljepljujuci udarac"
        icon=attacks/faerie-fire.png
        type=fire
        range=melee
        damage=4
        number=4
        [specials]
            [illuminate]
                id=illuminate
                name= _ "blistav"
                description= _ "Osvjetljava okolinu."
                value=4
