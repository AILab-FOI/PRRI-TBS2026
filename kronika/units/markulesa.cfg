[unit_type]
    id=Markulesa
    name= _ "Markulesa"
    race=undead
    image="units/markulesa-idle1.png"
    profile="portraits/markulesa.png"
    hitpoints=90
    movement_type=mounted
    movement=6
    experience=200
    level=3
    alignment=chaotic
    advances_to=null
    cost=80
    usage=fighter
    description= _ "Prokletnik u oklopu križa. Nitko ne zna njegovo pravo lice — samo tamu koja izbija iz kapuljače i koplje koje nikad ne promašuje. Kaže se da je nekad bio svetac, a sada je samo oruđe mraka."

    [abilities]
        [leadership]
            id=leadership
            value=25
            cumulative=no
            name= _ "Zapovjedništvo"
            description= _ "Neprijatelji u blizini postaju odvažniji pod Markulesinim prisustvom."
            affect_allies=no
            affect_enemies=yes
        [/leadership]
    [/abilities]

    [attack]
        name=lance
        description= _ "Sveto koplje"
        icon=attacks/spear.png
        type=pierce
        range=melee
        damage=16
        number=3
    [/attack]

    [attack]
        name=crusader_blade
        description= _ "Mač inkvizitora"
        icon=attacks/sword-heavy.png
        type=blade
        range=melee
        damage=12
        number=4
    [/attack]

    [attack]
        name=trample
        description= _ "Gaženje"
        icon=attacks/horse-attack.png
        type=impact
        range=melee
        damage=10
        number=2
        [specials]
            [slow]
                id=slow
                name= _ "Usporenje"
                description= _ "Pogođena meta je usporena jedan potez."
            [/slow]
        [/specials]
    [/attack]

    [resistance]
        blade=70
        pierce=60
        impact=80
        fire=90
        cold=110
        arcane=120
    [/resistance]

[/unit_type]
