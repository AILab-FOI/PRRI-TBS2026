[unit_type]
    id=Markulesa
    name= _ "Markulesa"
    race=undead
    undead=yes
    undead_variation=mounted

    image="units/markulesa-idle1.png"
    ellipse="misc/ellipse"
    halo="halo/darkens-aura.png"
    profile="portraits/markulesa.png"

    hitpoints=90
    movement_type=mounted
    movement=6
    zoc=yes
    experience=200
    level=3
    alignment=chaotic
    advances_to=null
    cost=80
    usage=fighter
    defense_weight=0.8

    die_sound={SOUND_LIST:HUMAN_DIE}

    description= _ "Prokletnik u oklopu križa. Nitko ne zna njegovo pravo lice — samo tamu koja izbija iz kapuljače i koplje koje nikad ne promašuje. Kaže se da je nekad bio svetac, a sada je samo oruđe mraka."

    [idle_anim]
        [frame]
            duration=200
            image="units/markulesa-idle1.png"
        [/frame]
    [/idle_anim]

    [movement_anim]
        [frame]
            duration=150
            image="units/markulesa-idle1.png"
        [/frame]
    [/movement_anim]

    [abilities]

        [leadership]
            id=leadership
            value=25
            cumulative=no
            name= _ "Zapovjedništvo"
            description= _ "Saveznici u blizini postaju odvažniji pod Markulesinim prisustvom."
            affect_allies=yes
            affect_enemies=no
        [/leadership]

    [/abilities]

    [attack]
        name=lance
        description= _ "Sveto koplje"
        icon="attacks/spear.png"
        type=pierce
        range=melee
        damage=14
        number=3
    [/attack]

    [attack]
        name=crusader_blade
        description= _ "Mač inkvizitora"
        icon="attacks/sword-heavy.png"
        type=blade
        range=melee
        damage=11
        number=4
    [/attack]

    [attack]
        name=trample
        description= _ "Gaženje"
        icon="attacks/hoof-nightmare.png"
        type=impact
        range=melee
        damage=10
        number=2

        [specials]
            [slow]
                id=slow
                name= _ "Usporenje"
                description= _ "Pogođena meta je usporena jedan potez."
            [/slow]
        [/specials]

    [/attack]

    [resistance]
        blade=70
        pierce=60
        impact=80
        fire=120
        cold=90
        arcane=120
    [/resistance]

[/unit_type]