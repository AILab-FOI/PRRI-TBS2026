[scenario]
    id=03_istra
    name= _ "Istra — Covjek iz sjene"
    next_scenario=04_slavonija
    turns=40
    victory_when_enemies_defeated=yes

    map_file=~add-ons/kronika/maps/istra.map

    {DEFAULT_SCHEDULE}
    {DEFAULT_MUSIC_PLAYLIST}

    [side]
        side=1
        controller=human
        team_name=player
        user_teamname= _ "Kraljevic Marko"
        canrecruit=yes
        type=Kraljevic
        id=Marko
        name= _ "Kraljevic Marko"
        x=23
        y=30
        recruit=Spearman,Jagar,Horseman
        gold=170
        income=3
        fog=yes
        shroud=yes
    [/side]

    [side]
        side=2
        controller=ai
        team_name=enemy
        user_teamname= _ "Crni Covjek"
        canrecruit=yes
        type=Crni_Covjek
        id=CrniCovjek
        name= _ "Crni Covjek"
        x=2
        y=4
        recruit=Vampire Bat,Ghost
        gold=110
        income=3
        [ai]
            aggression=0.4
            caution=0.8
        [/ai]
    [/side]

    [event]
    name=prestart

    [objectives]
        side=1
        [objective]
            description= _ "Porazi Crnog Čovjeka"
            condition=win
        [/objective]
        [objective]
            description= _ "Smrt Kraljevića Marka"
            condition=lose
        [/objective]
        [objective]
            description= _ "Nestane poteza"
            condition=lose
        [/objective]
    [/objectives]

    [item]
        x=28
        y=6
        image=scenery/torch1.png
    [/item]

    [store_unit]
        [filter]
            side=2
        [/filter]
        variable=side2_units
    [/store_unit]


    [/event]

    [event]
        name=start

        [message]
            speaker=narrator
            message= _ "Istra. Brda ovdje su maglovita. Pustoš i kamen .Stari tuneli rudnika. Ovdje je mrak — nešto se skriva."
        [/message]

        [message]
            speaker=Marko
            message= _ "Ovo nije dobro. Sela koja smo prošli su prazna. Nema ni traga života. Nema divljači. Ničeg."
        [/message]

        [message]
            id=Jagar1
            type=Spearman
            message= _ "Zemlja je hladna Marko, čuo sam od svojih doma, ISTRA NIKAD NIJE HLADNA."
        [/message]

        [message]
            speaker=Marko
            message= _ "Selo prije ljudi su pričali da su nestajanja bila blizu tunela Učke. Muškarci iz rudnika odlaze i nikad se ne vrate. Pripremite bazu blizu tunela."
        [/message]

        [message]
            id=Jagar1
            type=Spearman
            message= _ "Vidi! Ulaz u planinu, možda tamo nađemo naše odgovore"
        [/message]

        [message]
            speaker=Marko
            message= _ "Osjećam, osjećam da je nešto unutra, nešto što nas ne želi tamo."
        [/message]

        [message]
            id=Jagar1
            type=Spearman
            message= _ "Zašto imam osjećaj da ćemo nastradati"
        [/message]

    [/event]

    [event]
        name=die
        [filter]
            id=Marko
        [/filter]
        [message]
            speaker=Marko
            message= _ "Nisam... nisam uspio..."
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]

    [event]
        name=time over
        [message]
            speaker=narrator
            message= _ "Tama je progutala sve. Marko nije uspio na vrijeme."
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]

    [event]
        name=die
        [filter]
            id=CrniCovjek
        [/filter]
        [message]
            speaker=CrniCovjek
            message= _ "Ti ne razumijes... Mi smo samo sluge..."
        [/message]
        [message]
            speaker=Marko
            message= _ "Sluge? Sluge koga?"
        [/message]
        [message]
            speaker=narrator
            message= _ "Sjena se raspada u tamu. Nitko ne odgovara. Ali negdje u sumi Slavonije — nesto cuje pitanje."
        [/message]
        [endlevel]
            result=victory
            bonus=yes
            carryover_percentage=40
        [/endlevel]
    [/event]

[/scenario]