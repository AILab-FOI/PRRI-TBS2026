[scenario]
    id = 05_baba_yaga_scenario
    name = _"Baba Yaga"
    map_file = "05_baba_yaga.map"
    turns = 26
    next_scenario = null

    [story]
        [part]
            story = _"Nakon otkrića u Slavoniji, Kraljević Marko i njegovi Jagari kreću prema planinama Središnje Hrvatske. Pred njima se otvara začarana šuma u kojoj se putovi pomiču, drveće šapuće, a magla skriva izvor svega zla."
            background = "graphics/campaign-image.png"
        [/part]
    [/story]

    [side]
        side = 1
        controller = human
        team_name = player
        user_team_name = _"Marko"
        type = Kraljevic_Hero
        id = Marko
        name = _"Kraljević Marko"
        canrecruit = yes
        recruit = Jagar_Unit, Spearman, Bowman
        gold = 140
        income = 2
        x = 6
        y = 26
    [/side]

    [side]
        side = 2
        controller = ai
        team_name = enemy
        user_team_name = _"Baba Yaga"
        type = BabaYaga_Boss
        id = BabaYaga
        name = _"Baba Yaga"
        canrecruit = yes
        recruit = Baji_Unit
        gold = 180
        income = 6
        x = 26
        y = 4
    [/side]

    [objectives]
        side = 1
        [objective]
            description = _"Porazi Baba Yagu"
            condition = win
        [/objective]
        [objective]
            description = _"Uništi sva 3 totema moći"
            condition = win
        [/objective]
        [objective]
            description = _"Smrt Kraljevića Marka"
            condition = lose
        [/objective]
        [objective]
            description = _"Svi Jagari budu poraženi"
            condition = lose
        [/objective]
        [objective]
            description = _"Isteknu potezi"
            condition = lose
        [/objective]
    [/objectives]

    [event]
        name = prestart

        {VARIABLE totems_destroyed 0}
        {VARIABLE jagari_dead 0}
        {VARIABLE forest_shift_done no}
        {VARIABLE baba_midfight no}

        [unit]
            side = 1
            type = Jagar_Unit
            id = Jagar1
            name = _"Jagar"
            x = 7
            y = 26
        [/unit]

        [unit]
            side = 1
            type = Jagar_Unit
            id = Jagar2
            name = _"Jagar"
            x = 8
            y = 26
        [/unit]

        [item]
            x = 12
            y = 20
            image = "items/ball-blue.png"
        [/item]

        [item]
            x = 18
            y = 14
            image = "items/ball-blue.png"
        [/item]

        [item]
            x = 23
            y = 9
            image = "items/ball-blue.png"
        [/item]

        [label]
            x = 12
            y = 20
            text = _"Totem moći"
        [/label]

        [label]
            x = 18
            y = 14
            text = _"Totem moći"
        [/label]

        [label]
            x = 23
            y = 9
            text = _"Totem moći"
        [/label]
    [/event]

    [event]
        name = start

        [message]
            speaker = Marko
            message = _"Ovdje... šuma diše."
        [/message]

        [message]
            speaker = Jagar1
            message = _"Nikada nisam vidio ništa slično..."
        [/message]

        [message]
            speaker = Marko
            message = _"Držite se zajedno. Putovi će nas pokušati prevariti, ali moramo pronaći izvore njezine moći."
        [/message]

        [message]
            speaker = BabaYaga
            message = _"Dobro došao, Marko. Ušao si u srce svijeta koji ljudi više ne razumiju."
        [/message]
    [/event]

    [event]
        name = moveto
        first_time_only = yes

        [filter]
            side = 1
            x = 14-17
            y = 17-20
        [/filter]

        [message]
            speaker = Jagar2
            message = _"Put... nestao je!"
        [/message]

        [message]
            speaker = Marko
            message = _"Ona nas vodi kamo želi."
        [/message]

        {VARIABLE forest_shift_done yes}

        [terrain]
            x = 15,16,17
            y = 18,18,18
            terrain = Gs^Fms
        [/terrain]

        [terrain]
            x = 13,14
            y = 19,19
            terrain = Rr
        [/terrain]

        [redraw][/redraw]
    [/event]

    [event]
        name = moveto
        first_time_only = yes

        [filter]
            side = 1
            x = 12
            y = 20
        [/filter]

        [remove_item]
            x = 12
            y = 20
        [/remove_item]

        {VARIABLE_OP totems_destroyed add 1}

        [message]
            speaker = Marko
            message = _"Jedan totem je uništen. Osjećam kako njezina moć slabi."
        [/message]

        [unit]
            side = 2
            type = Baji_Unit
            id = BajiTotem1
            name = _"Baji"
            x = 13
            y = 20
        [/unit]

        [message]
            speaker = BajiTotem1
            message = _"Nećete oskvrnuti šumu!"
        [/message]
    [/event]

    [event]
        name = moveto
        first_time_only = yes

        [filter]
            side = 1
            x = 18
            y = 14
        [/filter]

        [remove_item]
            x = 18
            y = 14
        [/remove_item]

        {VARIABLE_OP totems_destroyed add 1}

        [message]
            speaker = Marko
            message = _"Drugi totem je pao. Nastavite naprijed!"
        [/message]

        [unit]
            side = 2
            type = Baji_Unit
            id = BajiTotem2
            name = _"Baji"
            x = 19
            y = 14
        [/unit]

        [unit]
            side = 2
            type = Baji_Unit
            id = BajiTotem3
            name = _"Baji"
            x = 18
            y = 13
        [/unit]
    [/event]

    [event]
        name = moveto
        first_time_only = yes

        [filter]
            side = 1
            x = 23
            y = 9
        [/filter]

        [remove_item]
            x = 23
            y = 9
        [/remove_item]

        {VARIABLE_OP totems_destroyed add 1}

        [message]
            speaker = BabaYaga
            message = _"Moja moć... slabi..."
        [/message]

        [message]
            speaker = Marko
            message = _"Ovo završava sada."
        [/message]

        [unit]
            side = 2
            type = Baji_Unit
            id = BajiTotem4
            name = _"Baji"
            x = 24
            y = 9
        [/unit]
    [/event]

    [event]
        name = moveto
        first_time_only = yes

        [filter]
            side = 1
            x = 24-28
            y = 3-6
        [/filter]

        [message]
            speaker = BabaYaga
            message = _"Napokon si stigao, Marko."
        [/message]

        [message]
            speaker = Marko
            message = _"Ti stojiš iza svega ovoga!"
        [/message]

        [message]
            speaker = BabaYaga
            message = _"Ja samo vraćam ravnotežu koju su ljudi davno narušili."
        [/message]
    [/event]

    [event]
        name = attack
        first_time_only = yes

        [filter]
            id = Marko
        [/filter]

        [filter_second]
            id = BabaYaga
        [/filter_second]

        [message]
            speaker = BabaYaga
            message = _"Ljudi su zaboravili stare zakone... Ja sam ih podsjetila."
        [/message]

        [message]
            speaker = Marko
            message = _"Ne možeš uništiti svijet da bi ga spasila!"
        [/message]
    [/event]

    [event]
        name = last breath
        [filter]
            id = Marko
        [/filter]

        [message]
            speaker = Marko
            message = _"Ako ovdje padnem... tama će progutati sve..."
        [/message]

        [endlevel]
            result = defeat
        [/endlevel]
    [/event]

    [event]
        name = die
        first_time_only = no

        [filter]
            id = Jagar1, Jagar2
        [/filter]

        [filter_condition]
            [not]
                [have_unit]
                    id = Jagar1
                [/have_unit]
            [/not]
            [not]
                [have_unit]
                    id = Jagar2
                [/have_unit]
            [/not]
        [/filter_condition]

        [message]
            speaker = Marko
            message = _"Izgubio sam Jagare... ne mogu sam kroz ovu živu tamu."
        [/message]

        [endlevel]
            result = defeat
        [/endlevel]
    [/event]

    [event]
        name = die
        [filter]
            id = BabaYaga
        [/filter]

        [filter_condition]
            [variable]
                name = totems_destroyed
                numerical_equals = 3
            [/variable]
        [/filter_condition]

        [message]
            speaker = BabaYaga
            message = _"Ravnoteža... mora postojati..."
        [/message]

        [message]
            speaker = Marko
            message = _"Ali ne ovako."
        [/message]

        [message]
            speaker = Marko
            message = _"Zlo nikada ne nestaje... samo čeka."
        [/message]

        [message]
            speaker = Jagar1
            message = _"Šuma se smiruje, gospodaru. Gotovo je."
        [/message]

        [message]
            speaker = narrator
            message = _"Kad tama ponovno dođe... Marko će se vratiti."
        [/message]

        [endlevel]
            result = victory
        [/endlevel]
    [/event]

    [event]
        name = die
        [filter]
            id = BabaYaga
        [/filter]

        [filter_condition]
            [variable]
                name = totems_destroyed
                numerical_not_equals = 3
            [/variable]
        [/filter_condition]

        [message]
            speaker = BabaYaga
            message = _"Dok god moji totemi stoje... ne možete me doista poraziti..."
        [/message]

        [endlevel]
            result = defeat
        [/endlevel]
    [/event]

    [event]
        name = time over

        [message]
            speaker = BabaYaga
            message = _"Prekasno, Marko. Šuma je izabrala svoj kraj."
        [/message]

        [endlevel]
            result = defeat
        [/endlevel]
    [/event]
[/scenario]