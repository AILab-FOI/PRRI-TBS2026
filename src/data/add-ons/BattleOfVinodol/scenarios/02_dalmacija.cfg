[scenario]
    id=02_dalmacija
    name= _ "Dalmacija — Dolazak zime"
    next_scenario=03_istra
    turns=32
    victory_when_enemies_defeated=yes

    map_file=~add-ons/kronika/maps/dalmacija.map

    {DEFAULT_SCHEDULE}
    {DEFAULT_MUSIC_PLAYLIST}

    [side]
        side=1
        controller=human
        team_name=player
        user_teamname= _ "Kraljević Marko"
        canrecruit=yes
        type=General
        id=Marko
        name= _ "Kraljević Marko"
        x=28
        y=31
        recruit=Spearman,Bowman,Horseman
        gold=110
        income=2
    [/side]

    [side]
        side=2
        controller=ai
        team_name=enemy
        user_teamname= _ "Krampusova vojska"
        canrecruit=yes
        type=Krampus
        id=Krampus
        name= _ "Krampus"
        x=26
        y=2
        recruit=Djinn,Troll Whelp,Dark Adept
        gold=170
        income=4
        [ai]
            aggression=0.7
            caution=0.3
        [/ai]
    [/side]

    [event]
        name=prestart

        [objectives]
            side=1
            [objective]
                description= _ "Probij se kroz Krampusovu vojsku divova i džina"
                condition=win
            [/objective]
            [objective]
                description= _ "Uništi Krampusov izvor moći"
                condition=win
            [/objective]
            [objective]
                description= _ "Porazi Krampusa"
                condition=win
            [/objective]
            [objective]
                description= _ "Smrt Kraljevića Marka"
                condition=lose
            [/objective]
            [objective]
                description= _ "Nestane poteza"
                condition=lose
            [/objective]
            [note]
                description= _ "Snježna oluja će se pojačavati tijekom pohoda. Drži Jagare zajedno i ne gubi vrijeme u zaleđenim klancima."
            [/note]
        [/objectives]

        [item]
            x=28
            y=6
            image=scenery/monolith1.png
        [/item]
    [/event]

    [event]
        name=start

        [message]
            speaker=narrator
            message= _ "Dalmacija. Obala koja je nekada mirisala na sol i borove sada škripi pod ledom. More udara o obalu kao da želi pobjeći od zime."
        [/message]

        [message]
            speaker=Marko
            message= _ "Ovo nije prirodna zima. Sunce stoji nad nama, a dah nam se ledi pred licem."
        [/message]

        [message]
            id=Jagar1
            type=Spearman
            message= _ "Sela su prazna, Marko. Vrata su otvorena, ognjišta ugašena. Ljudi su otišli naglo — ili su ih odveli."
        [/message]

        [message]
            speaker=Marko
            message= _ "Vještica iz Dubrovnika govorila je o onome koji vlada zimom. Sada znam njegovo ime. Krampus."
        [/message]

        [message]
            id=Jagar1
            type=Spearman
            message= _ "Planinski prolazi su zatvoreni. U klancima se miču sjene, a iza njih čujem korake koji nisu ljudski."
        [/message]

        [message]
            speaker=Marko
            message= _ "Krampus je zarobio prolaze i okupio vojsku džina. Ako želimo dalje prema Istri, moramo do njegova oltara i slomiti izvor ove zime."
        [/message]

        [message]
            speaker=narrator
            message= _ "Visoko među zaleđenim stijenama gori crni oltar. Dok on stoji, oluja sluša Krampusovu volju."
        [/message]
    [/event]

    [event]
        name=turn 6

        [message]
            speaker=narrator
            message= _ "Snježna oluja spušta se niz planinu. Vidik se gubi, a svaka stopa naprijed traži snagu."
        [/message]

        [message]
            speaker=Marko
            message= _ "Jagari, držite redove! Krampus želi da se razdvojimo. Ne dajte mu taj dar."
        [/message]
    [/event]

    [event]
        name=turn 14

        [message]
            speaker=narrator
            message= _ "Oluja se pretvara u bijeli zid. Iz njega odjekuje rožnati smijeh i zveckanje lanaca."
        [/message]

        [message]
            speaker=Krampus
            message= _ "Došli ste daleko, Kraljeviću Marko. Još malo pa će vam kosti čuvati moje prolaze."
        [/message]

        [message]
            speaker=Marko
            message= _ "Tvoja zima završava ovdje. Dalmacija će opet čuti more, a ne tvoje lance."
        [/message]
    [/event]

    [event]
        name=moveto
        [filter]
            side=1
            x=28
            y=6
        [/filter]

        [message]
            speaker=narrator
            message= _ "Markovi Jagari razbijaju crni oltar. Led puca pod nogama, a oluja na trenutak gubi glas."
        [/message]

        [message]
            speaker=Krampus
            message= _ "Ne! Taj plamen nije vaš! Bez njega... bez njega planine me neće slušati!"
        [/message]

        [message]
            speaker=Marko
            message= _ "Onda ćeš se boriti bez ukradene moći."
        [/message]
    [/event]

    [event]
        name=die
        [filter]
            id=Marko
        [/filter]
        [message]
            speaker=Marko
            message= _ "Nisam... nisam uspio..."
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]

    [event]
        name=time over
        [message]
            speaker=narrator
            message= _ "Oluja je zatvorila prolaze. Krampusova zima ostala je nad Dalmacijom, a Markov put prema Istri nestao je pod snijegom."
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]

    [event]
        name=die
        [filter]
            id=Krampus
        [/filter]
        [message]
            speaker=Krampus
            message= _ "Misliš da si pobijedio zimu, Kraljeviću? Ja sam bio samo lanac na vratima... a vrata vode u šume gdje ni sunce ne ulazi."
        [/message]
        [message]
            speaker=Marko
            message= _ "Govori jasno, nakazo. Tko stoji iza ovoga?"
        [/message]
        [message]
            speaker=Krampus
            message= _ "U Istri... ljudi nestaju bez krika. Tamo nema oltara ni vojske. Samo strah. Samo onaj koji hoda kao čovjek, a nije čovjek."
        [/message]
        [message]
            id=Jagar1
            type=Spearman
            message= _ "Black Man... tako su ga nazivali trgovci koji su pobjegli sa zapadnih cesta. Rekli su da se šuma utiša prije nego što netko nestane."
        [/message]
        [message]
            speaker=Krampus
            message= _ "Nisi dovoljno jak za ono što dolazi iz tame šuma... On ne lomi kosti. On lomi srce prije nego što podigne ruku."
        [/message]
        [message]
            speaker=narrator
            message= _ "Krampus se raspada u ledeni prah. S njegovom smrću more prvi put ponovno prodiše, a led se povlači s dalmatinskih sela. Ipak, mir ne traje dugo."
        [/message]
        [message]
            speaker=narrator
            message= _ "Iz razbijenog oltara ostaje crna iskra. Ne gasi se u snijegu, nego poleti prema zapadu, preko planina i kamenjara, sve do gustih istarskih šuma."
        [/message]
        [message]
            speaker=Marko
            message= _ "Dalmacija je oslobođena, ali put nije završen. Ako ta iskra vodi prema Istri, ondje ćemo naći sljedeće zlo. Jagari, skupite ranjene. Krećemo prije nego što tama stigne prva."
        [/message]
        [message]
            speaker=narrator
            message= _ "Dok Marko i Jagari napuštaju obalu, iza njih se vraća šum mora. Pred njima se, na zapadu, diže šuma koja ne šumi. Tamo počinje priča o Čovjeku iz sjene."
        [/message]
        [endlevel]
            result=victory
            bonus=yes
            carryover_percentage=40
        [/endlevel]
    [/event]

[/scenario]
