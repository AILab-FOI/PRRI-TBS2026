[scenario]
    id = 01_Initial_Scenario
    name = _"The First Oath"
    map_file = "01_Initial_Scenario.map"
    turns = 20

    [story]
        [part]
            story = _"In the lands of Vinodol, ancient forces stir..."
            background = "data/add-ons/BattleOfVinodol/graphics/campaign-image.png"
        [/part]
    [/story]

    [side]
        side = 1
        controller = human
        team_name = player
        type = Lieutenant
        id = Borna
        name = _"Borna"
        canrecruit = yes
        recruit = Spearman,Bowman
        gold = 100
    [/side]

    [side]
        side = 2
        controller = ai
        team_name = enemy
        type = Orcish Warrior
        id = Grga
        name = _"Grga"
        canrecruit = yes
        recruit = Orcish Grunt,Orcish Archer
        gold = 100
    [/side]

    [objectives]
        side=1
        [objective]
            description=_"Defeat Grga"
            condition=win
        [/objective]
        [objective]
            description=_"Death of Borna"
            condition=lose
        [/objective]
    [/objectives]
    
    [event]
        name=start

        [message]
            speaker=Borna
            message=_"Men of Vinodol! The oath we swore binds us to defend this land!"
        [/message]

        [message]
            speaker=Grga
            message=_"Your oaths mean nothing, human. We take what we want!"
        [/message]

    [/event]
    
    [event]
        name=die
        [filter]
            id=Grga
        [/filter]

        [message]
            speaker=Borna
            message=_"Vinodol stands unbroken!"
        [/message]
    [/event]

[/scenario]
