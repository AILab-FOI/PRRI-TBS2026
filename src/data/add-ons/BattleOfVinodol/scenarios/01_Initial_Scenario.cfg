[scenario]
    id = 01_dubrovnik_Scenario
    name = _"Sjene nad Dubrovnikom"
    map_file = "01_dubrovnik.map"
    turns = 20
    next_scenario = null 

    [story]
        [part]
            story = _"Kraljević Marko i njegovi Jagari dolaze pred zidine Dubrovnika. Glasine govore o mračnoj magiji, strahu u ulicama i Vještici koja vlada iz sjene."
            background = "graphics/campaign-image.png"
        [/part]
    [/story]

    [side]
        side = 1
        controller = human
        team_name = player
        user_team_name = _"Marko"
        type = Kraljevic_Hero
        id = Marko
        name = _"Kraljević Marko"
        canrecruit = yes
        recruit = Jagar_Unit, Spearman, Bowman
        gold = 100
        income = 2
        x = 6
        y = 4
    [/side]

    [side]
        side = 2
        controller = ai
        team_name = enemy
        user_team_name = _"Vještica"
        type = Vjestica_Boss
        id = Vjestica
        name = _"Vještica"
        canrecruit = yes
        recruit = Walking Corpse,Ghost,Skeleton
        gold = 120
        income = 4
        x = 34
        y = 12
    [/side]

    [side]
        side = 3
        controller = ai
        team_name = enemy
        user_team_name = _"Fratri bez glave"
        type = Fratar_Bez_Glave
        id = FratarVodja
        name = _"Fratar bez glave"
        canrecruit = yes
        recruit = Walking Corpse,Skeleton
        gold = 80
        income = 2
        x = 34
        y = 11
    [/side]

    [objectives]
        side = 1
        [objective]
            description = _"Porazi Vješticu"
            condition = win
        [/objective]
        [objective]
            description = _"Sekundarni: Očisti gradski trg od neprijatelja"
            condition = win
        [/objective]
        [objective]
            description = _"Smrt Kraljevića Marka"
            condition = lose
        [/objective]
        [objective]
            description = _"Svi vaši Jagari budu poraženi"
            condition = lose
        [/objective]
        [objective]
            description = _"Isteknu potezi"
            condition = lose
        [/objective]
    [/objectives]

    [event]
        name = prestart

        [unit]
            side = 1
            type = Jagar_Unit
            id = Jagar1
            name = _"Jagar"
            x = 7
            y = 4
        [/unit]

        [unit]
            side = 1
            type = Jagar_Unit
            id = Jagar2
            name = _"Jagar"
            x = 8
            y = 4
        [/unit]

        [unit]
            side = 3
            type = Fratar_Bez_Glave
            id = Fratar1
            name = _"Fratar bez glave"
            x = 12
            y = 11
        [/unit]

        [unit]
            side = 3
            type = Fratar_Bez_Glave
            id = Fratar2
            name = _"Fratar bez glave"
            x = 14
            y = 10
        [/unit]
    [/event]

    [event]
        name = start
        [message]
            speaker = Marko
            message = _"Dakle, ovo je Dubrovnik... tih, obavijen strahom. Nešto zlo zavladalo je ovim gradom."
        [/message]
        [message]
            speaker = Jagar1
            message = _"Gospodaru, ulice su prazne. Ali osjećam da nas netko promatra. Nismo sami."
        [/message]
        [message]
            speaker = Marko
            message = _"Držite se zajedno. Ući ćemo u grad, razbiti njihovu vlast i pronaći Vješticu koja stoji iza ove tame."
        [/message]
        [message]
            speaker = Fratar1
            message = _"Nitko neće narušiti njezin dvor iz sjene..."
        [/message]
    [/event]

    [event]
        name = moveto
        first_time_only = yes
        [filter]
            side = 1
            x = 10-14
            y = 9-13
        [/filter]
        [message]
            speaker = Marko
            message = _"Ovo mora biti gradski trg. Budite spremni! Ova tišina je zamka."
        [/message]
        [unit]
            side = 3
            type = Fratar_Bez_Glave
            id = FratarPojacanje1
            name = _"Fratar bez glave"
            x = 15
            y = 8
        [/unit]
        [unit]
            side = 3
            type = Skeleton
            id = FratarPojacanje2
            name = _"Ukleti sluga"
            x = 16
            y = 9
        [/unit]
        [message]
            speaker = FratarPojacanje1
            message = _"Trg pripada mrtvima!"
        [/message]
    [/event]

    [event]
        name = moveto
        first_time_only = yes
        [filter]
            side = 1
            x = 18-22
            y = 3-7
        [/filter]
        [message]
            speaker = Vjestica
            message = _"Daleko si stigao, Marko... ali ove zidine, ovo kamenje, ove sjene sada slušaju mene."
        [/message]
        [message]
            speaker = Marko
            message = _"Tvoja tama završava večeras, Vještice."
        [/message]
    [/event]

    [event]
        name = last breath
        [filter]
            id = Marko
        [/filter]
        [message]
            speaker = Marko
            message = _"Podbacio sam... Dubrovnik je izgubljen..."
        [/message]
        [endlevel]
            result = defeat
        [/endlevel]
    [/event]

    [event]
        name = die
        first_time_only = no
        [filter]
            id = Jagar1, Jagar2
        [/filter]
        [filter_condition]
            [not]
                [have_unit]
                    id = Jagar1
                [/have_unit]
            [/not]
            [not]
                [have_unit]
                    id = Jagar2
                [/have_unit]
            [/not]
        [/filter_condition]
        [message]
            speaker = Marko
            message = _"Izgubio sam svoje vjerne Jagare... ne mogu nastaviti sam kroz ove sjene."
        [/message]
        [endlevel]
            result = defeat
        [/endlevel]
    [/event]

    [event]
        name = die
        [filter]
            id = Vjestica
        [/filter]
        [message]
            speaker = Vjestica
            message = _"Ti si tek početak… On dolazi… onaj koji vlada zimom..."
        [/message]
        [message]
            speaker = Marko
            message = _"Vještica je poražena. Dubrovnik ponovno može slobodno disati."
        [/message]
        [message]
            speaker = Jagar1
            message = _"Sjene se povlače, gospodaru. Ali ovo zlo bilo je tek početak."
        [/message]
        [endlevel]
            result = victory
            next_scenario = 02_Sljedeci_Scenario
        [/endlevel]
    [/event]

    [event]
        name = time over
        [message]
            speaker = Vjestica
            message = _"Prekasno, junače. Dubrovnik je moj."
        [/message]
        [endlevel]
            result = defeat
        [/endlevel]
    [/event]
[/scenario]
