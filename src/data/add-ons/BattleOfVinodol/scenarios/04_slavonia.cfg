[scenario]
    id=04_slavonia
    name=_"Slavonia – Shadows of the Marsh"
    map_file="04_slavonia.map"
    turns=20

    [story]
        [part]
            story=_"Deep in the lands of Slavonia, dark forces gather in the marshes..."
            background="data/add-ons/BattleOfVinodol/graphics/campaign-image.png"
        [/part]
    [/story]

    # ========================
    # PLAYER SIDE
    # ========================
    [side]
        side=1
        controller=human
        team_name=player
        type=Lieutenant
        id=Borna
        name=_"Borna"
        canrecruit=yes
        recruit=Spearman,Bowman
        gold=120
        x=5
        y=10
    [/side]

    # ========================
    # ENEMY SIDE
    # ========================
    [side]
        side=2
        controller=ai
        team_name=enemy
        type=Skeleton
        id=Necromancer
        name=_"Dark Spirit"
        canrecruit=yes
        recruit=Skeleton,Skeleton Archer,Ghost
        gold=120
        x=30
        y=10
    [/side]

    # ========================
    # OBJECTIVES
    # ========================
    [objectives]
        side=1

        [objective]
            description=_"Defeat the Dark Spirit"
            condition=win
        [/objective]

        [objective]
            description=_"Death of Borna"
            condition=lose
        [/objective]
    [/objectives]

    # ========================
    # START DIALOG
    # ========================
    [event]
        name=start

        [message]
            speaker=Borna
            message=_"These lands feel cursed... Stay alert!"
        [/message]

        [message]
            speaker=Necromancer
            message=_"You should not have come here, mortal..."
        [/message]
    [/event]

    # ========================
    # WIN EVENT
    # ========================
    [event]
        name=die

        [filter]
            id=Necromancer
        [/filter]

        [message]
            speaker=Borna
            message=_"The darkness fades... for now."
        [/message]
    [/event]

[/scenario]
