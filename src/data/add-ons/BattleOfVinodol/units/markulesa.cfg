[unit_type]
    id=Markulesa_Knight
    name= _ "Markuleša"
    race=human
    image="graphics/markulesa.png"
    hitpoints=72
    movement_type=mounted
    movement=8
    experience=150
    level=3
    alignment=lawful
    advances_to=null
    cost=58
    usage=fighter
    description= _ "Legendarni vitez Markuleša, Markov najvjerniji suborac. Njegov oklop je neprobojan, a njegovo dugačko konjaničko koplje donosi strah u srca neprijatelja. Kad Markuleša krene u juriš, zemlja se trese, a redovi neprijatelja pucaju pod silinom njegovog udarca."

    [resistance]
        blade=70      
        pierce=120    
        impact=70
        fire=100
        cold=100
        arcane=80
    [/resistance]

    [attack]
        name=lance
        description=_"konjaničko koplje"
        icon=attacks/lance.png
        type=pierce
        range=melee
        [specials]
            {WEAPON_SPECIAL_CHARGE} # Dupli damage i njemu i neprijatelju kad napada!
        [/specials]
        damage=14
        number=3
    [/attack]

    [attack]
        name=greatsword
        description=_"veliki mač"
        icon=attacks/greatsword-human.png
        type=blade
        range=melee
        damage=11
        number=4
    [/attack]
[/unit_type]