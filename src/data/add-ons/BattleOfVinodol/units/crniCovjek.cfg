[unit_type]
    id=Crni_Covjek
    name= _ "Crni Čovjek"
    race=undead
    image="graphics/crni_covjek-idle1.png"
    hitpoints=48
    movement_type=undeadfoot
    movement=6
    experience=90
    level=2
    alignment=chaotic
    advances_to=null
    cost=34
    usage=fighter
    description= _ "Neki kažu da je to duh palog ratnika, drugi da je samo sjena kojoj je vještica udahnula život. Crni čovjek se kreće nečujno i udara tamo gdje boli najviše, nestajući u tami prije nego što žrtva stigne vrisnuti."

    [abilities]
        {ABILITY_SKIRMISHER}   # Može prolaziti kroz neprijateljska polja (ne mogu ga zaustaviti)
        {ABILITY_NIGHTSTALK}  # Nevidljiv je u selima po noći
    [/abilities]

    [resistance]
        blade=70
        pierce=70
        impact=80
        fire=120
        arcane=130
    [/resistance]

    [attack]
        name=shadow_blade
        description=_"oštrica sjene"
        icon=attacks/dagger-undead.png
        type=blade
        range=melee
        damage=9
        number=3
        [specials]
            {WEAPON_SPECIAL_BACKSTAB}
        [/specials]
    [/attack]

    [attack]
        name=dark_breath
        description=_"crni dah"
        icon=attacks/dark-missile.png
        type=arcane
        range=ranged
        damage=6
        number=2
        [specials]
            {WEAPON_SPECIAL_SLOW} 
        [/specials]
    [/attack]
[/unit_type]